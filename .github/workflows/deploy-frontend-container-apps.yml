name: Deploy Frontend to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'Dockerfile.web'
      - '.github/workflows/deploy-frontend-container-apps.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'

env:
  REGISTRY: rankifyacr.azurecr.io
  IMAGE_NAME: rankify-frontend
  CONTAINER_APP_NAME: rankify-frontend
  RESOURCE_GROUP: rankify
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: AZ_resources
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js for verification
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Install pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # 4. Install and verify build
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Next.js build locally
        run: pnpm build:web
        env:
          NEXT_PUBLIC_API_URL: https://rankify-v1-src.azurewebsites.net
          NODE_ENV: production

      # 5. Azure Login using environment-scoped secrets
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ toJson(fromJson(format('{{\"clientId\":\"{0}\",\"clientSecret\":\"{1}\",\"subscriptionId\":\"{2}\",\"tenantId\":\"{3}\",\"activeDirectoryEndpointUrl\":\"https://login.microsoftonline.com\",\"resourceManagerEndpointUrl\":\"https://management.azure.com/\",\"activeDirectoryGraphResourceId\":\"https://graph.windows.net/\",\"sqlManagementEndpointUrl\":\"https://management.core.windows.net:8443/\",\"galleryEndpointUrl\":\"https://gallery.azure.com/\",\"managementEndpointUrl\":\"https://management.core.windows.net/\"}}', env.AZURE_CLIENT_ID, env.AZURE_CLIENT_SECRET, env.AZURE_SUBSCRIPTION_ID, env.AZURE_TENANT_ID))) }}

      # 6. Build and push Docker image using ACR
      - name: Build and push Docker image to ACR
        run: |
          az acr build \
            --registry rankifyacr \
            --image rankify-frontend:latest \
            --image rankify-frontend:${{ github.sha }} \
            --file Dockerfile.web \
            .

      # 7. Update Container App with new image
      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/rankify-frontend:latest

      # 8. Verify deployment
      - name: Verify deployment
        run: |
          echo "Container App deployment started"
          echo "Monitoring status..."
          for i in {1..30}; do
            STATUS=$(az containerapp show --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.provisioningState" -o tsv)
            echo "Attempt $i: Status = $STATUS"
            if [ "$STATUS" = "Succeeded" ]; then
              echo "✅ Deployment successful!"
              break
            fi
            sleep 2
          done

      - name: Get Container App URL
        run: |
          URL=$(az containerapp show --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Container App URL: $URL"

      # 9. Deployment summary
      - name: Deployment Summary
        if: always()
        run: |
          echo "=== DEPLOYMENT SUMMARY ==="
          echo "Image: ${{ env.REGISTRY }}/rankify-frontend:latest"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Status: Deployment workflow completed"
