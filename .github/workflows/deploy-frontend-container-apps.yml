name: Deploy Frontend to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'Dockerfile.web'
      - '.github/workflows/deploy-frontend-container-apps.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'

env:
  REGISTRY: rankifyacr.azurecr.io
  IMAGE_NAME: rankify-frontend
  CONTAINER_APP_NAME: rankify-frontend
  RESOURCE_GROUP: rankify

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Install pnpm
      - name: Install pnpm
        run: npm install -g pnpm

      # 4. Build frontend
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Next.js build
        run: pnpm build:web
        env:
          NEXT_PUBLIC_API_URL: https://rankify-v1-src.azurewebsites.net
          NODE_ENV: production

      # 5. Azure Login via CLI directly (no action, no encryption issues)
      - name: Azure Login via CLI
        run: |
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "✅ Logged in to Azure"

      # 6. Build and push to ACR
      - name: Build and push Docker image to ACR
        run: |
          az acr build \
            --registry rankifyacr \
            --image rankify-frontend:latest \
            --image rankify-frontend:${{ github.sha }} \
            --file Dockerfile.web \
            .

      # 7. Update Container App
      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/rankify-frontend:latest

      # 8. Verify deployment
      - name: Verify deployment
        run: |
          echo "Container App deployment started"
          for i in {1..30}; do
            STATUS=$(az containerapp show --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Unknown")
            echo "Attempt $i: Status = $STATUS"
            if [ "$STATUS" = "Succeeded" ]; then
              echo "✅ Deployment successful!"
              break
            fi
            sleep 2
          done

      - name: Get Container App URL
        run: |
          URL=$(az containerapp show --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "URL pending")
          echo "Container App URL: $URL"

      # 9. Summary
      - name: Deployment Summary
        if: always()
        run: |
          echo "=== DEPLOYMENT SUMMARY ==="
          echo "Image: ${{ env.REGISTRY }}/rankify-frontend:latest"
          echo "Commit: ${{ github.sha }}"
          echo "Status: Deployment workflow completed"
