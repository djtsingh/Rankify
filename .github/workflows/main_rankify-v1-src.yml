# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js project to Azure Function App - rankify-v1-src

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/main_rankify-v1-src.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'api' # API folder with Azure Functions
  NODE_VERSION: '22.x' # Node 22 to match Function App

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout
      
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 'Prepare Package for Remote Build'
        run: |
          cd ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          # Ensure clean state - remove any local build artifacts
          rm -rf node_modules functions lib
          ls -la

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'rankify-v1-src'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
          remote-build: true
      
      - name: Deployment Summary
        if: always()
        run: |
          echo "=== AZURE FUNCTIONS DEPLOYMENT SUMMARY ==="
          echo "Function App: rankify-v1-src"
          echo "Slot: Production"
          echo "Package: API functions"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          
          if [ ${{ job.status }} = 'success' ]; then
            echo "Status: ✅ SUCCESS"
            echo "The Azure Functions have been successfully deployed!"
          else
            echo "Status: ❌ FAILED"
            echo "Deployment failed. Check the logs above for details."
          fi
          